<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קטלוג למידה ארגונית · גרסה A · Arctic White</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;700;800&family=Noto+Serif+Hebrew:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f7f9fc;
  --paper-deep: #eef2f7;
  --paper-edge: #e3e9f0;
  --ink: #0d1421;
  --ink-soft: #2d3748;
  --ink-muted: #64748b;
  --ink-faint: #a8b2c1;
  --rule: #e3e9f0;
  --rule-soft: #eef2f7;
  --accent: #2563eb;
  /* Arctic — very low intensity, cool-only palette (5-7%) */
  --halo-1: rgba(96, 165, 250, 0.07);   /* sky blue */
  --halo-2: rgba(148, 163, 184, 0.05);  /* slate */
  --halo-3: rgba(125, 211, 252, 0.06);  /* light cyan */
  --halo-4: rgba(186, 230, 253, 0.06);  /* pale azure */
  --halo-5: rgba(165, 180, 252, 0.05);  /* indigo soft */
  --halo-6: rgba(103, 232, 249, 0.05);  /* aqua */
  --halo-7: rgba(203, 213, 225, 0.04);  /* neutral */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Heebo', sans-serif;
  font-weight: 400;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Atmospheric gradient mesh - the 'aura' */
body::before {
  content: '';
  position: fixed;
  inset: -10%;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, var(--halo-1), transparent 60%),
    radial-gradient(ellipse 50% 45% at 85% 15%, var(--halo-2), transparent 60%),
    radial-gradient(ellipse 55% 50% at 75% 75%, var(--halo-3), transparent 60%),
    radial-gradient(ellipse 45% 40% at 25% 85%, var(--halo-4), transparent 60%),
    radial-gradient(ellipse 40% 35% at 50% 50%, var(--halo-6), transparent 65%);
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.8s ease, filter 0.8s ease;
}

/* When viewing a specific cluster, aura tilts toward its color */
body.cluster-active::before {
  filter: saturate(1.15);
}

body.cluster-1::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-1), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-1), transparent 60%),
    radial-gradient(ellipse 40% 35% at 50% 50%, rgba(58, 90, 124, 0.04), transparent 65%);
}
body.cluster-2::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-2), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-2), transparent 60%);
}
body.cluster-3::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-3), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-3), transparent 60%);
}
body.cluster-4::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-4), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-4), transparent 60%);
}
body.cluster-5::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-5), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-5), transparent 60%);
}
body.cluster-6::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-6), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-6), transparent 60%);
}
body.cluster-7::before {
  background:
    radial-gradient(ellipse 70% 60% at 20% 25%, var(--halo-7), transparent 55%),
    radial-gradient(ellipse 55% 50% at 80% 70%, var(--halo-7), transparent 60%);
}

/* Hover-reactive layer - follows cursor on cluster cards */
body::after {
  content: '';
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--hover-color, transparent) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 0.5s ease;
  transform: translate(-50%, -50%);
  left: var(--hover-x, 50%);
  top: var(--hover-y, 50%);
  filter: blur(20px);
}
body.hover-active::after {
  opacity: 1;
}

.serif { font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif; }

/* ===== HERO (modern centered) ===== */
.hero {
  padding: 64px 48px 48px;
  text-align: center;
  position: relative;
  z-index: 2;
  background: transparent;
  border-bottom: 1px solid var(--rule);
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  padding: 7px 16px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid var(--rule);
  border-radius: 999px;
  margin-bottom: 28px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.eyebrow-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
  50% { box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.08); }
}

.eyebrow-sep {
  color: var(--ink-faint);
  font-weight: 300;
}

.hero-title {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-weight: 900;
  font-size: clamp(48px, 6.5vw, 92px);
  line-height: 1;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin: 0 auto;
  max-width: 900px;
}

.hero-subtitle {
  font-family: 'Heebo', sans-serif;
  font-weight: 400;
  font-size: clamp(15px, 1.4vw, 18px);
  line-height: 1.55;
  color: var(--ink-muted);
  margin: 18px auto 0;
  max-width: 580px;
  letter-spacing: 0.005em;
}

.hero-stats {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 44px;
  padding: 18px 28px;
  background: rgba(255, 255, 255, 0.65);
  border: 1px solid var(--rule);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px -8px rgba(13, 20, 33, 0.06);
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 22px;
  min-width: 92px;
}

.stat-num {
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  font-size: 32px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

.stat-label {
  font-family: 'Heebo', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink-muted);
}

.stat-divider {
  width: 1px;
  height: 28px;
  background: var(--rule);
  flex-shrink: 0;
}

/* ===== SEARCH BAR ===== */
.search-section {
  padding: 22px 48px;
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
  background: rgba(247, 249, 252, 0.75);
}

.search-wrap {
  display: flex;
  gap: 16px;
  align-items: center;
  max-width: 1400px;
  margin: 0 auto;
}

.search-box {
  flex: 1;
  position: relative;
}

.search-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--ink);
  padding: 10px 36px 10px 0;
  font-family: 'Heebo', sans-serif;
  font-size: 17px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}

.search-input::placeholder {
  color: var(--ink-faint);
  font-style: italic;
}

.search-icon {
  position: absolute;
  inset-inline-end: 0;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-muted);
  pointer-events: none;
}

.filter-chip {
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid var(--ink);
  padding: 8px 18px;
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  color: var(--ink);
  white-space: nowrap;
  border-radius: 999px;
}

.filter-chip:hover { background: var(--ink); color: var(--paper); }
.filter-chip.active { background: var(--ink); color: var(--paper); }

/* ===== BREADCRUMB ===== */
.breadcrumb {
  padding: 18px 48px 0;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 500;
  max-width: 1400px;
  margin: 0 auto;
}

.breadcrumb span { display: inline-block; }

.breadcrumb a {
  color: var(--ink-muted);
  text-decoration: none;
  cursor: pointer;
  transition: color 0.15s;
}
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .sep { margin: 0 10px; color: var(--ink-faint); }
.breadcrumb .current { color: var(--ink); font-weight: 600; }

/* ===== MAIN GRID ===== */
.main {
  padding: 32px 48px 80px;
  position: relative;
  z-index: 2;
  max-width: 1400px;
  margin: 0 auto;
}

/* ===== CLUSTER GRID (HOME) ===== */
.section-eyebrow {
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-eyebrow::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule);
}

.cluster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
  background: transparent;
  border: none;
}

.cluster-card {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 32px 28px 26px;
  cursor: pointer;
  position: relative;
  transition: background 0.3s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}

.cluster-card::before {
  content: '';
  position: absolute;
  inset-inline-start: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: var(--cluster-color);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

.cluster-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), var(--cluster-color) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  mix-blend-mode: multiply;
}

.cluster-card:hover {
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 10px 40px -20px rgba(0,0,0,0.15);
}
.cluster-card:hover::before {
  transform: scaleY(1);
}
.cluster-card:hover::after {
  opacity: 0.08;
}

.cluster-num {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 300;
  font-size: 13px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
}

.cluster-card h2 {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-weight: 700;
  font-size: 26px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 14px 0 18px;
}

.cluster-stats {
  display: flex;
  gap: 28px;
  padding-top: 14px;
  border-top: 1px solid var(--rule-soft);
}

.cluster-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.cluster-stat-num {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 700;
  font-size: 28px;
  color: var(--cluster-color);
  line-height: 1;
}

.cluster-stat-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 500;
}

.cluster-arrow {
  position: absolute;
  top: 32px;
  inset-inline-start: 28px;
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 22px;
  color: var(--ink-faint);
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}

.cluster-card:hover .cluster-arrow {
  color: var(--cluster-color);
  transform: translateX(-6px);
}

/* ===== DOMAIN GRID ===== */
.cluster-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--ink);
  position: relative;
}

.cluster-header-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 32px;
  flex-wrap: wrap;
}

.cluster-header-text h2 {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-weight: 900;
  font-size: clamp(34px, 4vw, 52px);
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
  margin-top: 6px;
}

.cluster-header-stats {
  display: flex;
  gap: 32px;
  align-items: flex-end;
}

.header-stat {
  text-align: center;
}

.header-stat-num {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 700;
  font-size: 42px;
  line-height: 1;
  color: var(--cluster-color);
}

.header-stat-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-top: 4px;
  font-weight: 500;
}

.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 24px;
}

.domain-card {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid var(--rule);
  padding: 24px 26px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
}

.domain-card::before {
  content: '';
  position: absolute;
  inset-inline-end: -50px;
  top: -50px;
  width: 100px;
  height: 100px;
  background: var(--cluster-color);
  opacity: 0;
  border-radius: 50%;
  transition: opacity 0.3s, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

.domain-card:hover {
  border-color: var(--cluster-color);
  background: rgba(255, 255, 255, 0.92);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px -16px rgba(0,0,0,0.15);
}
.domain-card:hover::before {
  opacity: 0.06;
  transform: scale(1.5);
}

.domain-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  gap: 12px;
}

.domain-card h3 {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1.2;
  color: var(--ink);
  letter-spacing: -0.005em;
}

.domain-count {
  background: var(--cluster-color);
  color: var(--paper);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}

.domain-expert {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--rule-soft);
  margin-top: 14px;
}

.expert-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cluster-color);
  flex-shrink: 0;
}

.expert-name {
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 500;
}

.expert-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  font-weight: 500;
  margin-left: auto;
}

/* ===== CHALLENGES LIST ===== */
.domain-header {
  margin-bottom: 32px;
  padding-bottom: 22px;
  border-bottom: 2px solid var(--ink);
}

.domain-header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  flex-wrap: wrap;
}

.domain-header h2 {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-weight: 900;
  font-size: clamp(32px, 4vw, 48px);
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
  margin-top: 8px;
}

.domain-cluster-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
}

.domain-cluster-tag .dot {
  width: 8px;
  height: 8px;
  background: var(--cluster-color);
  border-radius: 50%;
}

.domain-expert-large {
  font-family: 'Frank Ruhl Libre', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 17px;
  color: var(--ink-muted);
}
.domain-expert-large strong {
  font-style: normal;
  color: var(--ink);
  font-weight: 600;
}

.challenges-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-top: 1px solid var(--rule);
}

.challenge-item {
  border-bottom: 1px solid var(--rule);
  background: transparent;
  transition: background 0.25s ease;
}

.challenge-item.expanded {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-bottom: 2px solid var(--ink);
}

.challenge-header {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 22px 4px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.challenge-header:hover {
  padding-inline-start: 12px;
  padding-inline-end: 12px;
  background: rgba(255, 255, 255, 0.5);
}

.challenge-num {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 300;
  font-size: 32px;
  color: var(--cluster-color);
  line-height: 1;
  letter-spacing: -0.02em;
}

.challenge-title {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-weight: 600;
  font-size: 19px;
  line-height: 1.35;
  color: var(--ink);
  letter-spacing: -0.005em;
}

.challenge-toggle {
  width: 36px;
  height: 36px;
  border: 1px solid var(--ink);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--ink);
  transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  background: rgba(255, 255, 255, 0.7);
  flex-shrink: 0;
}

.challenge-item.expanded .challenge-toggle {
  background: var(--ink);
  color: var(--paper);
  transform: rotate(45deg);
}

.challenge-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.challenge-item.expanded .challenge-body {
  max-height: 4000px;
}

.challenge-content {
  padding: 8px 4px 36px;
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 20px;
}

.challenge-content-spacer {}

.challenge-content-main {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.challenge-desc {
  font-family: 'Frank Ruhl Libre', 'Noto Serif Hebrew', serif;
  font-size: 18px;
  line-height: 1.65;
  color: var(--ink-soft);
  max-width: 780px;
  padding: 20px 24px;
  background: rgba(255, 255, 255, 0.7);
  border-inline-start: 3px solid var(--cluster-color);
  border-radius: 0 4px 4px 0;
}

.channels-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0;
  border: 1px solid var(--rule);
  border-radius: 4px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.channel {
  padding: 22px 22px 24px;
  border-inline-end: 1px solid var(--rule);
  position: relative;
  background: transparent;
}

.channel:last-child { border-inline-end: none; }

.channel-empty {
  background: repeating-linear-gradient(
    45deg,
    rgba(0,0,0,0.012),

    rgba(0,0,0,0.03) 6px,
    rgba(0,0,0,0.03) 12px
  );
  opacity: 0.55;
}

.channel-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule);
}

.channel-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid var(--ink);
  border-radius: 50%;
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 700;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.85);
  flex-shrink: 0;
}

.channel-empty .channel-icon {
  border-color: var(--ink-faint);
  color: var(--ink-faint);
}

.channel-title {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--ink);
}

.channel-empty .channel-title { color: var(--ink-muted); }

.channel-empty-msg {
  font-family: 'Frank Ruhl Libre', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-faint);
  text-align: center;
  padding: 20px 0;
}

.field {
  margin-bottom: 14px;
}

.field-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 4px;
}

.field-value {
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  white-space: pre-line;
}

.field-value.large {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 15px;
  line-height: 1.6;
}

.unique-section {
  margin-top: 8px;
  padding: 26px 28px;
  background: var(--ink);
  color: var(--paper);
  position: relative;
  border-radius: 4px;
}

.unique-section::before {
  content: '';
  position: absolute;
  top: -10px;
  inset-inline-start: 22px;
  width: 20px;
  height: 20px;
  background: var(--cluster-color);
  transform: rotate(45deg);
}

.unique-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(245, 241, 234, 0.2);
}

.unique-label {
  font-family: 'Frank Ruhl Libre', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--paper);
}

.unique-content {
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-line;
  color: var(--paper);
}

/* ===== EMPTY STATES ===== */
.no-results {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-muted);
}

.no-results h3 {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 700;
  font-size: 28px;
  color: var(--ink);
  margin-bottom: 8px;
}

.no-results p {
  font-family: 'Frank Ruhl Libre', serif;
  font-style: italic;
  font-size: 16px;
}

/* ===== SEARCH RESULTS ===== */
.search-result {
  padding: 22px 4px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: padding 0.2s;
}
.search-result:hover {
  padding-inline-start: 12px;
  background: rgba(255, 255, 255, 0.6);
}

.search-result-path {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 6px;
}

.search-result h4 {
  font-family: 'Frank Ruhl Libre', serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.3;
}

.search-result-desc {
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

mark {
  background: rgba(138, 44, 31, 0.15);
  color: var(--accent);
  padding: 0 2px;
  font-weight: 600;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.view {
  animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.cluster-card, .domain-card {
  animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* Stagger */
.cluster-card:nth-child(1) { animation-delay: 0.02s; }
.cluster-card:nth-child(2) { animation-delay: 0.06s; }
.cluster-card:nth-child(3) { animation-delay: 0.10s; }
.cluster-card:nth-child(4) { animation-delay: 0.14s; }
.cluster-card:nth-child(5) { animation-delay: 0.18s; }
.cluster-card:nth-child(6) { animation-delay: 0.22s; }
.cluster-card:nth-child(7) { animation-delay: 0.26s; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero, .search-section, .main, .breadcrumb { padding-inline: 20px; }
  .hero { padding-top: 44px; padding-bottom: 32px; }
  .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 16px;
    width: 100%;
    box-sizing: border-box;
  }
  .stat { padding: 8px 4px; min-width: 0; }
  .stat-num { font-size: 24px; }
  .stat-label { font-size: 10px; }
  .stat-divider { display: none; }
  .cluster-grid { grid-template-columns: 1fr; }
  .domain-grid { grid-template-columns: 1fr; }
  .channels-grid { grid-template-columns: 1fr; }
  .channel { border-inline-end: none; border-bottom: 1px solid var(--rule); }
  .channel:last-child { border-bottom: none; }
  .challenge-header { grid-template-columns: 40px 1fr 36px; gap: 14px; }
  .challenge-num { font-size: 24px; }
  .challenge-title { font-size: 16px; }
  .challenge-content { grid-template-columns: 1fr; }
  .challenge-content-spacer { display: none; }
  .search-wrap { flex-direction: column; align-items: stretch; }
  .filter-row { display: flex; gap: 8px; overflow-x: auto; }
}
</style>

const META = {"מדעים מדויקים, טכנולוגיה ו- STEM": {"short": "STEM", "color": "#3a5a7c", "accent": "#dde8f2", "num": "01"}, "אוריינות שפתית ותרבות": {"short": "אוריינות", "color": "#8c5a3c", "accent": "#f0e3d6", "num": "02"}, "בעלי תפקידים": {"short": "תפקידים", "color": "#5d6b4a", "accent": "#e4ead8", "num": "03"}, "תוכניות בית ספריות": {"short": "תוכניות", "color": "#7a4a5e", "accent": "#eedce4", "num": "04"}, "טיפול בהון האנושי": {"short": "הון אנושי", "color": "#a87034", "accent": "#f4e2cc", "num": "05"}, "פרט, חברה וחוסן חברתי-רגשי": {"short": "פרט וחברה", "color": "#4a6b7c", "accent": "#dae7ed", "num": "06"}, "מנהלים": {"short": "מנהלים", "color": "#3d3d3d", "accent": "#e8e6e3", "num": "07"}};

let state = {
  view: 'home', // home | cluster | domain | search
  cluster: null,
  domain: null,
  search: '',
  channelFilter: 'all',
  expandedChallenge: null
};

const $main = document.getElementById('main');
const $breadcrumb = document.getElementById('breadcrumb');
const $search = document.getElementById('searchInput');

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function highlight(text, query) {
  if (!query || !text) return escapeHtml(text);
  const esc = escapeHtml(text);
  const regex = new RegExp('(' + query.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'gi');
  return esc.replace(regex, '<mark>$1</mark>');
}

function clusterTotalChallenges(cluster) {
  return Object.values(DATA[cluster]).reduce((sum, d) => sum + d.challenges.length, 0);
}

function renderBreadcrumb() {
  let html = '<a onclick="goHome()">קטלוג ראשי</a>';
  if (state.cluster) {
    html += '<span class="sep">/</span>';
    if (state.domain) {
      html += '<a onclick="goCluster(\''+state.cluster.replace(/'/g, "\\'")+'\')">'+escapeHtml(state.cluster)+'</a>';
      html += '<span class="sep">/</span><span class="current">'+escapeHtml(state.domain)+'</span>';
    } else {
      html += '<span class="current">'+escapeHtml(state.cluster)+'</span>';
    }
  } else if (state.search) {
    html += '<span class="sep">/</span><span class="current">תוצאות חיפוש: "'+escapeHtml(state.search)+'"</span>';
  }
  $breadcrumb.innerHTML = html;
}

function renderHome() {
  let html = '<div class="view">';
  html += '<div class="section-eyebrow">שבעת האשכולות</div>';
  html += '<div class="cluster-grid">';
  
  Object.keys(DATA).forEach((cluster, i) => {
    const meta = META[cluster];
    const domains = Object.keys(DATA[cluster]).length;
    const challenges = clusterTotalChallenges(cluster);
    html += `
      <div class="cluster-card" style="--cluster-color: ${meta.color}" onclick="goCluster('${cluster.replace(/'/g, "\\'")}')">
        <div>
          <div class="cluster-num">${meta.num}</div>
          <h2>${escapeHtml(cluster)}</h2>
        </div>
        <div class="cluster-stats">
          <div class="cluster-stat">
            <span class="cluster-stat-num">${domains}</span>
            <span class="cluster-stat-label">תחומים</span>
          </div>
          <div class="cluster-stat">
            <span class="cluster-stat-num">${challenges}</span>
            <span class="cluster-stat-label">אתגרים</span>
          </div>
        </div>
        <div class="cluster-arrow">←</div>
      </div>
    `;
  });
  
  html += '</div></div>';
  $main.innerHTML = html;
}

function renderCluster() {
  const cluster = state.cluster;
  const meta = META[cluster];
  const domains = DATA[cluster];
  const totalChallenges = clusterTotalChallenges(cluster);
  
  let html = `<div class="view" style="--cluster-color: ${meta.color}">`;
  html += `
    <div class="cluster-header">
      <div class="cluster-header-meta">
        <div class="cluster-header-text">
          <div class="domain-cluster-tag"><span class="dot"></span>אשכול ${meta.num}</div>
          <h2>${escapeHtml(cluster)}</h2>
        </div>
        <div class="cluster-header-stats">
          <div class="header-stat">
            <div class="header-stat-num">${Object.keys(domains).length}</div>
            <div class="header-stat-label">תחומים</div>
          </div>
          <div class="header-stat">
            <div class="header-stat-num">${totalChallenges}</div>
            <div class="header-stat-label">אתגרים</div>
          </div>
        </div>
      </div>
    </div>
    <div class="section-eyebrow">בחר תחום להתעמקות</div>
    <div class="domain-grid">
  `;
  
  Object.entries(domains).forEach(([domain, info]) => {
    html += `
      <div class="domain-card" onclick="goDomain('${cluster.replace(/'/g, "\\'")}', '${domain.replace(/'/g, "\\'")}')">
        <div class="domain-card-top">
          <h3>${escapeHtml(domain)}</h3>
          <div class="domain-count">${info.challenges.length}</div>
        </div>
        <div class="domain-expert">
          <div class="expert-dot"></div>
          <div class="expert-name">${escapeHtml(info.expert)}</div>
          <div class="expert-label">מומחה תוכן</div>
        </div>
      </div>
    `;
  });
  
  html += '</div></div>';
  $main.innerHTML = html;
}

function renderDomain() {
  const cluster = state.cluster;
  const domain = state.domain;
  const meta = META[cluster];
  const info = DATA[cluster][domain];
  
  let html = `<div class="view" style="--cluster-color: ${meta.color}">`;
  html += `
    <div class="domain-header">
      <div class="domain-header-row">
        <div>
          <div class="domain-cluster-tag"><span class="dot"></span>${escapeHtml(cluster)}</div>
          <h2>${escapeHtml(domain)}</h2>
        </div>
        <div class="domain-expert-large">
          באחריות <strong>${escapeHtml(info.expert)}</strong>
        </div>
      </div>
    </div>
    <div class="challenges-list">
  `;
  
  info.challenges.forEach((ch, idx) => {
    const isExpanded = state.expandedChallenge === ch.id;
    html += `
      <div class="challenge-item ${isExpanded ? 'expanded' : ''}" data-id="${ch.id}">
        <div class="challenge-header" onclick="toggleChallenge(${ch.id})">
          <div class="challenge-num">${String(idx+1).padStart(2,'0')}</div>
          <div class="challenge-title">${escapeHtml(ch.title)}</div>
          <div class="challenge-toggle">+</div>
        </div>
        <div class="challenge-body">
          <div class="challenge-content">
            <div class="challenge-content-spacer"></div>
            <div class="challenge-content-main">
              ${ch.description ? `<div class="challenge-desc">${escapeHtml(ch.description)}</div>` : ''}
              ${renderChannels(ch)}
              ${ch.unique ? `
                <div class="unique-section">
                  <div class="unique-header">
                    <span class="channel-icon" style="background:transparent;border-color:var(--paper);color:var(--paper);">★</span>
                    <span class="unique-label">מענים ייחודיים</span>
                  </div>
                  <div class="unique-content">${escapeHtml(ch.unique)}</div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  });
  
  html += '</div></div>';
  $main.innerHTML = html;
}

function renderChannels(ch) {
  const channels = [
    { key: 'training', label: 'הדרכה', icon: 'א', data: ch.training },
    { key: 'development', label: 'פיתוח מקצועי', icon: 'ב', data: ch.development },
    { key: 'community', label: 'קהילות למידה', icon: 'ג', data: ch.community }
  ];
  
  // Filter by channel if active
  const filter = state.channelFilter;
  let filtered = channels;
  if (filter !== 'all' && filter !== 'unique') {
    filtered = channels.filter(c => c.key === filter);
  }
  
  let html = '<div class="channels-grid">';
  filtered.forEach(c => {
    const hasData = c.data.scope || c.data.audience || c.data.detail || c.data.days;
    if (!hasData) {
      html += `
        <div class="channel channel-empty">
          <div class="channel-header">
            <span class="channel-icon">${c.icon}</span>
            <span class="channel-title">${c.label}</span>
          </div>
          <div class="channel-empty-msg">— לא קיים מענה בערוץ זה —</div>
        </div>
      `;
      return;
    }
    html += `
      <div class="channel">
        <div class="channel-header">
          <span class="channel-icon">${c.icon}</span>
          <span class="channel-title">${c.label}</span>
        </div>
        ${c.data.scope ? `<div class="field"><div class="field-label">היקף</div><div class="field-value">${escapeHtml(c.data.scope)}</div></div>` : ''}
        ${c.data.days ? `<div class="field"><div class="field-label">ימים</div><div class="field-value">${escapeHtml(c.data.days)}</div></div>` : ''}
        ${c.data.audience ? `<div class="field"><div class="field-label">קהל יעד</div><div class="field-value">${escapeHtml(c.data.audience)}</div></div>` : ''}
        ${c.data.detail ? `<div class="field"><div class="field-label">פירוט</div><div class="field-value large">${escapeHtml(c.data.detail)}</div></div>` : ''}
      </div>
    `;
  });
  html += '</div>';
  return html;
}

function renderSearch() {
  const q = state.search.toLowerCase().trim();
  if (!q) { renderHome(); return; }
  
  const results = [];
  Object.entries(DATA).forEach(([cluster, domains]) => {
    Object.entries(domains).forEach(([domain, info]) => {
      info.challenges.forEach(ch => {
        const haystack = [
          ch.title, ch.description, ch.expert, ch.unique,
          ch.training.detail, ch.training.audience,
          ch.development.detail, ch.development.audience,
          ch.community.detail, ch.community.audience,
          domain, cluster
        ].join(' ').toLowerCase();
        if (haystack.includes(q)) {
          results.push({cluster, domain, ch});
        }
      });
    });
  });
  
  let html = '<div class="view">';
  html += `<div class="section-eyebrow">${results.length} תוצאות עבור "${escapeHtml(state.search)}"</div>`;
  
  if (results.length === 0) {
    html += `<div class="no-results"><h3>לא נמצאו תוצאות</h3><p>נסה מילת חיפוש אחרת או דפדף בקטלוג</p></div>`;
  } else {
    html += '<div>';
    results.forEach(({cluster, domain, ch}) => {
      const meta = META[cluster];
      html += `
        <div class="search-result" style="border-inline-start: 3px solid ${meta.color}; padding-inline-start: 16px;" onclick="goToChallenge('${cluster.replace(/'/g, "\\'")}', '${domain.replace(/'/g, "\\'")}', ${ch.id})">
          <div class="search-result-path">${escapeHtml(cluster)} <span style="color:var(--ink-faint);">←</span> ${escapeHtml(domain)}</div>
          <h4>${highlight(ch.title, state.search)}</h4>
          <div class="search-result-desc">${highlight(ch.description || '', state.search)}</div>
        </div>
      `;
    });
    html += '</div>';
  }
  
  html += '</div>';
  $main.innerHTML = html;
}

function render() {
  renderBreadcrumb();
  if (state.search) renderSearch();
  else if (state.view === 'home') renderHome();
  else if (state.view === 'cluster') renderCluster();
  else if (state.view === 'domain') renderDomain();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  state = { view: 'home', cluster: null, domain: null, search: '', channelFilter: state.channelFilter, expandedChallenge: null };
  $search.value = '';
  render();
}

function goCluster(cluster) {
  state.view = 'cluster';
  state.cluster = cluster;
  state.domain = null;
  state.search = '';
  state.expandedChallenge = null;
  $search.value = '';
  render();
}

function goDomain(cluster, domain) {
  state.view = 'domain';
  state.cluster = cluster;
  state.domain = domain;
  state.search = '';
  state.expandedChallenge = null;
  $search.value = '';
  render();
}

function goToChallenge(cluster, domain, id) {
  state.view = 'domain';
  state.cluster = cluster;
  state.domain = domain;
  state.search = '';
  state.expandedChallenge = id;
  $search.value = '';
  render();
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function toggleChallenge(id) {
  state.expandedChallenge = state.expandedChallenge === id ? null : id;
  // Re-render only the domain view
  if (state.view === 'domain') renderDomain();
}

// Search input
$search.addEventListener('input', e => {
  state.search = e.target.value;
  render();
});

// Filter chips
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.channelFilter = chip.dataset.channel;
    if (state.expandedChallenge && state.view === 'domain') renderDomain();
  });
});
document.querySelector('.filter-chip[data-channel="all"]').classList.add('active');

// Hover-reactive halo on cluster cards
document.addEventListener('mousemove', (e) => {
  const card = e.target.closest('.cluster-card, .domain-card');
  if (card) {
    const rect = card.getBoundingClientRect();
    const mx = ((e.clientX - rect.left) / rect.width) * 100;
    const my = ((e.clientY - rect.top) / rect.height) * 100;
    card.style.setProperty('--mx', mx + '%');
    card.style.setProperty('--my', my + '%');
    
    // Global aura follow on cluster grid
    if (card.classList.contains('cluster-card')) {
      const color = getComputedStyle(card).getPropertyValue('--cluster-color').trim();
      if (color) {
        const r = parseInt(color.slice(1,3), 16);
        const g = parseInt(color.slice(3,5), 16);
        const b = parseInt(color.slice(5,7), 16);
        document.body.style.setProperty('--hover-color', `rgba(${r}, ${g}, ${b}, 0.12)`);
        document.body.style.setProperty('--hover-x', e.clientX + 'px');
        document.body.style.setProperty('--hover-y', e.clientY + 'px');
        document.body.classList.add('hover-active');
      }
    }
  } else {
    document.body.classList.remove('hover-active');
  }
});

// Apply cluster-active body class for ambient tint
function applyClusterAmbient() {
  document.body.classList.remove('cluster-active', 'cluster-1','cluster-2','cluster-3','cluster-4','cluster-5','cluster-6','cluster-7');
  if (state.cluster) {
    const num = META[state.cluster].num;
    document.body.classList.add('cluster-active', 'cluster-' + parseInt(num,10));
  }
}

// Wrap render to also update ambient
const _origRender = render;
render = function() {
  _origRender();
  applyClusterAmbient();
};

// Initial render
render();
</script>

</body>
</html>
